<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForestGuard — Detect in minutes. Respond in seconds.</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #07090a; color: #e8efe9; font-family: system-ui, -apple-system, sans-serif; }
  .tab-nav { 
    position: sticky; top: 0; z-index: 100; 
    background: #07090a; border-bottom: 1px solid #1a2520; 
    display: flex; 
  }
  .tab-button { 
    flex: 1; padding: 1rem; background: none; border: none; 
    color: #8a9489; font-size: 14px; cursor: pointer; 
    border-bottom: 3px solid transparent; text-transform: uppercase; 
    letter-spacing: 4px; transition: all 0.3s;
  }
  .tab-button:hover { color: #e8efe9; }
  .tab-button.active { color: #82c69b; border-bottom-color: #82c69b; }
  .content { display: none; }
  .content.active { display: block; }
  .error { color: #ff6b35; padding: 2rem; text-align: center; }
</style>
</head>
<body>
<nav class="tab-nav">
  <button class="tab-button active" onclick="switchTab('landing', this)">Landing</button>
  <button class="tab-button" onclick="switchTab('dashboard', this)">Dashboard</button>
</nav>
<div id="landing" class="content active"></div>
<div id="dashboard" class="content"></div>

<script>
function switchTab(tabName, button) {
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
  document.getElementById(tabName).classList.add('active');
  button.classList.add('active');
}

// Detect if running on GitHub Pages or Vercel
const isGitHubPages = window.location.hostname.includes('github.io');
const basePath = isGitHubPages ? '/forestguard-alpha' : '';

// Load HTML files
Promise.all([
  fetch(basePath + '/forestguard-landing.html').then(r => r.text()),
  fetch(basePath + '/forestguard-dashboard.html').then(r => r.text())
]).then(([landing, dashboard]) => {
  document.getElementById('landing').innerHTML = landing;
  document.getElementById('dashboard').innerHTML = dashboard;
}).catch(error => {
  console.error('Error loading content:', error);
  document.getElementById('landing').innerHTML = '<div class="error">⚠️ Error loading landing page</div>';
  document.getElementById('dashboard').innerHTML = '<div class="error">⚠️ Error loading dashboard</div>';
});
</script>
</body>
</html>
